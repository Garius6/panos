name: Deploy сайт (доки + web-песочница) на GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # release: nightly подтягивал ПОСЛЕДНИЙ ночной билд на момент запуска
      # CI, а не тот, что стоит локально (dev-2026-06:285f6d87b) — расхождение
      # в месяц+ уже один раз сломало сборку: core:mem's dynamic_arena_init
      # между версиями поменял набор именованных параметров ("No parameter
      # named 'alignment'"). Пиним конкретный тег релиза, совпадающий с
      # локальным тулчейном, вместо плавающего "nightly".
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-06

      # wasm-ld (линкер под -target:js_wasm32) — не в дефолтном ubuntu-
      # раннере, ставится отдельно пакетом lld.
      - name: Установить wasm-ld
        run: sudo apt-get update && sudo apt-get install -y lld

      # demo/panos.wasm — build-артефакт (.gitignore), собирается только
      # здесь (см. `just build-wasm`). -o:size обязателен: дефолтный
      # -o:minimal даёт модуль, на JIT-компиляции которого падает
      # JavaScriptCore (Safari/WebKit) — см. комментарий в wasm/main.odin.
      - name: Собрать panos.wasm
        run: odin build wasm -target:js_wasm32 -o:size -out:demo/panos.wasm

      # mdBook публикует готовые бинарники в своих GitHub Releases — проще
      # и надёжнее скачать напрямую, чем тянуть отдельный marketplace-экшен
      # ради одной команды. Версия пинится (как и Odin выше) вместо
      # "latest", чтобы сборка не ломалась незамеченным апдейтом.
      - name: Установить mdbook
        run: |
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.5.4/mdbook-v0.5.4-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv mdbook /usr/local/bin/

      - name: Собрать документацию
        run: mdbook build docs

      # Один Pages-сайт на репозиторий — доки и песочница собираются в
      # общий каталог: доки в корне (первая точка входа для новичка),
      # песочница на /playground/ (относительные пути внутри demo/index.html
      # — odin.js, panos.wasm — не зависят от того, под каким префиксом
      # каталог отдаётся, переносить их не нужно).
      - name: Собрать сайт
        run: |
          mkdir -p site
          cp -r docs/book/. site/
          mkdir -p site/playground
          cp -r demo/. site/playground/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

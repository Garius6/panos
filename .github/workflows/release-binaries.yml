name: Собрать бинарники и создать релиз

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Собрать ${{ matrix.suffix }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            suffix: linux-amd64
            ext: ""

          - os: macos-14
            suffix: macos-arm64
            ext: ""

          - os: windows-2022
            suffix: windows-amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-06

      - name: Собрать panos
        shell: bash
        run: |
          set -euo pipefail
          odin build . -o:speed -out:panos${{ matrix.ext }}

      - name: Собрать panos-lsp
        shell: bash
        run: |
          set -euo pipefail
          odin build ./lsp -o:speed -out:panos-lsp${{ matrix.ext }}

      - name: Подготовить файлы релиза
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp \
            "panos${{ matrix.ext }}" \
            "dist/panos-${{ matrix.suffix }}${{ matrix.ext }}"

          cp \
            "panos-lsp${{ matrix.ext }}" \
            "dist/panos-lsp-${{ matrix.suffix }}${{ matrix.ext }}"

      - name: Сохранить результат сборки
        uses: actions/upload-artifact@v4
        with:
          name: panos-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Создать GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Скачать бинарники всех платформ
        uses: actions/download-artifact@v4
        with:
          pattern: panos-*
          path: dist
          merge-multiple: true

      - name: Проверить состав релиза
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/panos-linux-amd64
          test -f dist/panos-lsp-linux-amd64
          test -f dist/panos-macos-arm64
          test -f dist/panos-lsp-macos-arm64
          test -f dist/panos-windows-amd64.exe
          test -f dist/panos-lsp-windows-amd64.exe

          find dist -maxdepth 1 -type f -print

      - name: Создать релиз и приложить бинарники
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/* \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
          fi         path: dist/*

name: Собрать бинарники и приложить к релизу

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            ext: ""
          - os: macos-14
            suffix: macos-arm64
            ext: ""
          - os: macos-13
            suffix: macos-amd64
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Тот же тег релиза, что и в deploy-pages.yml — совпадает с локальным
      # тулчейном, а не плавающий "nightly" (см. заметку там же про поломку
      # из-за расхождения версий).
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-06

      - name: Собрать panos
        run: odin build . -o:speed -out:panos${{ matrix.ext }}

      - name: Собрать panos-lsp
        run: odin build ./lsp -o:speed -out:panos-lsp${{ matrix.ext }}

      - name: Упаковать бинарники под платформу
        shell: bash
        run: |
          mkdir -p dist
          cp panos${{ matrix.ext }} dist/panos-${{ matrix.suffix }}${{ matrix.ext }}
          cp panos-lsp${{ matrix.ext }} dist/panos-lsp-${{ matrix.suffix }}${{ matrix.ext }}

      # workflow_dispatch (ручной прогон без реального релиза) — только
      # для проверки, что сборка проходит на всех платформах; заливка
      # в assets имеет смысл только когда есть реальный релиз-тег.
      - name: Приложить к релизу
        if: github.event_name == 'release'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Сохранить как build-артефакт (ручной прогон)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: panos-${{ matrix.suffix }}
          path: dist/*

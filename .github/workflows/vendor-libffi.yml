name: Собрать vendored libffi

on:
  workflow_dispatch:
    inputs:
      libffi_version:
        description: Версия libffi без префикса v
        required: true
        default: "3.7.1"
        type: string

permissions:
  contents: read

concurrency:
  group: vendor-libffi
  cancel-in-progress: false

env:
  LIBFFI_VERSION: ${{ inputs.libffi_version }}

jobs:
  build-unix:
    name: libffi ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-amd64
            host: x86_64-pc-linux-gnu
          - runner: macos-15
            platform: darwin-arm64
            host: aarch64-apple-darwin

    steps:
      - name: Получить panos
        uses: actions/checkout@v4

      # Это обычный checkout во временную директорию runner-а,
      # а не submodule и не зависимость в репозитории panos.
      - name: Получить исходники libffi
        uses: actions/checkout@v4
        with:
          repository: libffi/libffi
          ref: v${{ inputs.libffi_version }}
          path: _deps/libffi
          fetch-depth: 1

      - name: Установить инструменты сборки Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install --yes autoconf automake libtool texinfo

      - name: Установить инструменты сборки macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install autoconf automake libtool
          echo "$(brew --prefix libtool)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Сгенерировать configure
        shell: bash
        working-directory: _deps/libffi
        run: |
          set -euxo pipefail
          autoreconf --force --install --verbose

      - name: Собрать статическую libffi
        shell: bash
        run: |
          set -euxo pipefail

          src="$GITHUB_WORKSPACE/_deps/libffi"
          build="$GITHUB_WORKSPACE/_build/libffi-${{ matrix.platform }}"
          out="$GITHUB_WORKSPACE/out/external/libffi"

          mkdir -p "$build"
          cd "$build"

          "$src/configure" \
            --build="${{ matrix.host }}" \
            --host="${{ matrix.host }}" \
            --disable-shared \
            --enable-static \
            --disable-docs \
            --with-pic

          jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu)"
          make -j"$jobs"

          archive="$(find "$build" -type f -path '*/.libs/libffi.a' -print -quit)"
          ffi_h="$(find "$build" -type f -path '*/include/ffi.h' -print -quit)"
          ffitarget_h="$(find "$build" -type f -path '*/include/ffitarget.h' -print -quit)"

          test -n "$archive"
          test -n "$ffi_h"
          test -n "$ffitarget_h"

          mkdir -p \
            "$out/lib/${{ matrix.platform }}" \
            "$out/include"

          cp "$archive" \
            "$out/lib/${{ matrix.platform }}/libffi.a"
          cp "$ffi_h" \
            "$out/include/${{ matrix.platform }}-ffi.h"
          cp "$ffitarget_h" \
            "$out/include/${{ matrix.platform }}-ffitarget.h"

          ar -t "$out/lib/${{ matrix.platform }}/libffi.a" | head

      - name: Подставить библиотеку в рабочую копию panos
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p external/libffi/lib/${{ matrix.platform }} external/libffi/include
          cp out/external/libffi/lib/${{ matrix.platform }}/libffi.a \
            external/libffi/lib/${{ matrix.platform }}/libffi.a
          cp out/external/libffi/include/${{ matrix.platform }}-*.h \
            external/libffi/include/

      - name: Установить Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-06

      - name: Проверить линковку с panos
        shell: bash
        run: odin build . -o:speed -out:panos-smoke

      - name: Сохранить платформенный архив
        uses: actions/upload-artifact@v4
        with:
          name: libffi-${{ matrix.platform }}
          path: out
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: libffi windows-amd64
    runs-on: windows-2022

    steps:
      - name: Не преобразовывать окончания строк shell-скриптов
        shell: pwsh
        run: git config --global core.autocrlf input

      - name: Получить panos
        uses: actions/checkout@v4

      - name: Получить исходники libffi
        uses: actions/checkout@v4
        with:
          repository: libffi/libffi
          ref: v${{ inputs.libffi_version }}
          path: _deps/libffi
          fetch-depth: 1

      - name: Установить Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          platform: x64
          packages: make autoconf automake libtool texinfo dos2unix

      - name: Активировать MSVC x64
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: amd64

      - name: Собрать статическую libffi через MSVC
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          set -euxo pipefail

          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          src="$workspace/_deps/libffi"
          out="$workspace/out/external/libffi"

          cd "$src"
          autoreconf --force --install --verbose

          ./configure \
            --build=x86_64-w64-mingw32 \
            --host=x86_64-w64-mingw32 \
            --disable-shared \
            --enable-static \
            --disable-docs \
            CC="$src/msvcc.sh -m64" \
            CXX="$src/msvcc.sh -m64" \
            LD=link \
            CPP="cl -nologo -EP" \
            CXXCPP="cl -nologo -EP" \
            CPPFLAGS="-DFFI_STATIC_BUILD -DUSE_STATIC_RTL" \
            CFLAGS="-DFFI_STATIC_BUILD -DUSE_STATIC_RTL" \
            AR="$src/.ci/ar-lib lib" \
            NM="dumpbin -symbols" \
            STRIP=:

          make -j"$(nproc)"

          # libffi-*.lib — это import library от DLL.
          # libffi_convenience.lib — настоящий статический архив объектов.
          archive="$(find . -type f -path '*/.libs/libffi_convenience.lib' -print -quit)"
          ffi_h="$(find . -type f -path '*/include/ffi.h' -print -quit)"
          ffitarget_h="$(find . -type f -path '*/include/ffitarget.h' -print -quit)"

          test -n "$archive"
          test -n "$ffi_h"
          test -n "$ffitarget_h"

          mkdir -p "$out/lib/windows-amd64" "$out/include"

          cp "$archive" "$out/lib/windows-amd64/libffi.lib"
          cp "$ffi_h" "$out/include/windows-amd64-ffi.h"
          cp "$ffitarget_h" "$out/include/windows-amd64-ffitarget.h"

      - name: Проверить статический архив
        shell: pwsh
        run: |
          $archive = "out/external/libffi/lib/windows-amd64/libffi.lib"
          if (-not (Test-Path $archive)) {
            throw "Не найден $archive"
          }
          lib.exe /nologo /list $archive | Select-Object -First 20

      - name: Подставить библиотеку в рабочую копию panos
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force external/libffi/lib/windows-amd64 | Out-Null
          New-Item -ItemType Directory -Force external/libffi/include | Out-Null

          Copy-Item out/external/libffi/lib/windows-amd64/libffi.lib external/libffi/lib/windows-amd64/libffi.lib -Force
          Copy-Item out/external/libffi/include/windows-amd64-*.h external/libffi/include/ -Force

      - name: Установить Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-06

      - name: Проверить линковку с panos
        shell: pwsh
        run: odin build . -o:speed -out:panos-smoke.exe

      - name: Сохранить платформенный архив
        uses: actions/upload-artifact@v4
        with:
          name: libffi-windows-amd64
          path: out
          if-no-files-found: error
          retention-days: 7

  collect:
    name: Собрать единый vendored-пакет
    needs:
      - build-unix
      - build-windows
    runs-on: ubuntu-24.04

    steps:
      - name: Скачать результаты всех платформ
        uses: actions/download-artifact@v4
        with:
          pattern: libffi-*
          path: bundle
          merge-multiple: true

      - name: Проверить структуру пакета
        shell: bash
        run: |
          set -euxo pipefail

          test -f bundle/external/libffi/lib/linux-amd64/libffi.a
          test -f bundle/external/libffi/lib/darwin-arm64/libffi.a
          test -f bundle/external/libffi/lib/windows-amd64/libffi.lib

          test -f bundle/external/libffi/include/linux-amd64-ffi.h
          test -f bundle/external/libffi/include/darwin-arm64-ffi.h
          test -f bundle/external/libffi/include/windows-amd64-ffi.h

          find bundle -type f -print | sort

      - name: Сохранить единый пакет
        uses: actions/upload-artifact@v4
        with:
          name: libffi-v${{ inputs.libffi_version }}-vendored
          path: bundle
          if-no-files-found: error
          retention-days: 30
